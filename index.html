<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台鐵自動售票機模擬系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        'slide-up-fade': {
                            '0%': { transform: 'translateY(20px)', opacity: 0 },
                            '100%': { transform: 'translateY(0)', opacity: 1 },
                        }
                    },
                    animation: {
                        'slide-up-fade': 'slide-up-fade 0.5s ease-out forwards',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        /* 拖曳時的視覺回饋 */
        .drag-over-slot {
            box-shadow: 0 0 20px rgba(74,222,128,1) !important;
            border-color: #4ade80 !important;
            transform: scale(1.05);
        }
        
        /* 車票底紋 */
        .ticket-bg {
            background-color: #fcf6eb;
            background-image: radial-gradient(#e5d9c5 1px, transparent 1px);
            background-size: 10px 10px;
        }
    </style>
</head>
<body class="bg-black text-gray-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const REGIONS = {
          north: {
            name: '北臺灣', color: 'bg-green-200 text-green-800 border-green-400',
            counties: [
              { name: '基隆市', stations: ['[基隆]', '三坑', '[八堵]', '[七堵]', '百福', '暖暖'] },
              { name: '臺北市', stations: ['[南港]', '[松山]', '[臺北]', '[萬華]'] },
              { name: '新北市', stations: ['[汐止]', '汐科', '五堵', '[板橋]', '浮洲', '[樹林]', '南樹林', '山佳', '[鶯歌]', '四腳亭', '[瑞芳]', '[猴硐]', '三貂嶺', '牡丹', '[雙溪]', '貢寮', '[福隆]'] },
              { name: '桃園市', stations: ['[桃園]', '內壢', '[中壢]', '埔心', '楊梅', '富岡', '新富'] },
              { name: '新竹縣', stations: ['北湖', '湖口', '新豐', '[竹北]'] },
              { name: '新竹市', stations: ['北新竹', '[新竹]', '三姓橋', '香山'] }
            ]
          },
          central: {
            name: '中臺灣', color: 'bg-yellow-200 text-yellow-800 border-yellow-400',
            counties: [
              { name: '苗栗縣', stations: ['崎頂', '[竹南]', '造橋', '[豐富]', '[苗栗]', '南勢', '銅鑼', '[三義]', '談文', '大山', '[後龍]', '龍港', '白沙屯', '新埔', '[通霄]', '[苑裡]'] },
              { name: '臺中市', stations: ['泰安', '[后里]', '[豐原]', '栗林', '潭子', '頭家厝', '[松竹]', '太原', '精武', '[臺中]', '五權', '大慶', '烏日', '[新烏日]', '成功', '日南', '[大甲]', '臺中港', '[清水]', '[沙鹿]', '龍井', '大肚', '追分'] },
              { name: '彰化縣', stations: ['[彰化]', '花壇', '大村', '[員林]', '永靖', '社頭', '[田中]', '[二水]'] },
              { name: '雲林縣', stations: ['林內', '石榴', '[斗六]', '[斗南]', '石龜'] }
            ]
          },
          south: {
            name: '南臺灣', color: 'bg-blue-200 text-blue-800 border-blue-400',
            counties: [
              { name: '嘉義縣', stations: ['[大林]', '[民雄]', '水上', '南靖'] },
              { name: '嘉義市', stations: ['嘉北', '[嘉義]'] },
              { name: '臺南市', stations: ['後壁', '[新營]', '柳營', '林鳳營', '[隆田]', '拔林', '[善化]', '南科', '新市', '[永康]', '大橋', '[臺南]', '保安', '仁德', '中洲'] },
              { name: '高雄市', stations: ['大湖', '路竹', '[岡山]', '橋頭', '楠梓', '[新左營]', '左營', '內惟', '美術館', '鼓山', '三塊厝', '[高雄]', '[鳳山]', '後庄', '[九曲堂]'] },
              { name: '屏東縣', stations: ['六塊厝', '[屏東]', '歸來', '麟洛', '[西勢]', '竹田', '[潮州]', '崁頂', '[南州]', '鎮安', '[林邊]', '[佳冬]', '東海', '[枋寮]', '加祿', '內獅', '枋山'] }
            ]
          },
          east: {
            name: '東臺灣', color: 'bg-pink-200 text-pink-800 border-pink-400',
            counties: [
              { name: '宜蘭縣', stations: ['漢本', '武塔', '[南澳]', '[東澳]', '永樂', '[蘇澳]', '[蘇澳新]', '新馬', '[冬山]', '[羅東]', '中里', '二結', '[宜蘭]', '四城', '[礁溪]', '頂埔', '[頭城]', '外澳', '龜山', '大溪', '大里', '石城'] },
              { name: '花蓮縣', stations: ['[富里]', '東竹', '東里', '[玉里]', '三民', '[瑞穗]', '富源', '大富', '[光復]', '萬榮', '[鳳林]', '南平', '[林榮新光]', '豐田', '[壽豐]', '平和', '[志學]', '[吉安]', '[花蓮]', '北埔', '景美', '[新城(太魯閣)]', '崇德', '和仁', '[和平]'] },
              { name: '臺東縣', stations: ['[大武]', '[瀧溪]', '[金崙]', '[太麻里]', '[知本]', '康樂', '[臺東]', '山里', '[鹿野]', '瑞源', '瑞和', '[關山]', '海端', '[池上]'] }
            ]
          },
          branches: {
            name: '客運支線', color: 'bg-gray-200 text-gray-800 border-gray-400',
            counties: [
              { name: '平溪線', stations: ['三貂嶺', '大華', '十分', '望古', '嶺腳', '平溪', '菁桐'] },
              { name: '深澳線', stations: ['瑞芳', '海科館', '八斗子'] },
              { name: '內灣線', stations: ['新竹', '北新竹', '千甲', '新莊', '竹中', '上員', '榮華', '竹東', '橫山', '九讚頭', '合興', '富貴', '內灣'] },
              { name: '六家線', stations: ['竹中', '六家'] },
              { name: '集集線', stations: ['二水', '源泉', '濁水', '龍泉', '集集', '水里', '車埕'] },
              { name: '沙崙線', stations: ['中洲', '長榮大學', '沙崙'] }
            ]
          }
        };

        function App() {
          const [currentTime, setCurrentTime] = useState(new Date());
          const [idleTime, setIdleTime] = useState(60);
          const [step, setStep] = useState('HOME');
          
          const getTodayString = () => {
            const d = new Date();
            return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
          };

          const [ticketInfo, setTicketInfo] = useState({
            purchaseType: '時刻購票',
            date: getTodayString(),
            timeRange: '15:00 - 23:59',
            origin: '臺南',
            destination: '',
            trainCategory: '對號列車',
            tickets: { full: 0, child: 0, senior: 0, concession: 0 },
            selectedTrain: null,
            totalAmount: 0
          });

          const [selectedRegion, setSelectedRegion] = useState(null);
          const [selectedCounty, setSelectedCounty] = useState(null);
          const [editingField, setEditingField] = useState(null); // 用於追蹤左側欄點擊了哪個「更改」
          
          const [paymentMethod, setPaymentMethod] = useState(null);
          const [paidAmount, setPaidAmount] = useState(0);
          const [outputItems, setOutputItems] = useState([]); 
          const [showTicketModal, setShowTicketModal] = useState(false); 
          const [dragOverSlot, setDragOverSlot] = useState(null); // 'coin' or 'bill'

          useEffect(() => {
            const timer = setInterval(() => {
              setCurrentTime(new Date());
              setIdleTime(prev => {
                if (prev <= 1 && step !== 'HOME' && step !== 'SUCCESS') {
                  handleReset();
                  return 60;
                }
                return prev > 0 ? prev - 1 : 0;
              });
            }, 1000);
            return () => clearInterval(timer);
          }, [step]);

          const resetIdle = () => setIdleTime(60);

          const handleReset = () => {
            setStep('HOME');
            setTicketInfo({
              purchaseType: '時刻購票',
              date: getTodayString(),
              timeRange: '15:00 - 23:59',
              origin: '臺南',
              destination: '',
              trainCategory: '對號列車',
              tickets: { full: 0, child: 0, senior: 0, concession: 0 },
              selectedTrain: null,
              totalAmount: 0
            });
            setSelectedRegion(null);
            setSelectedCounty(null);
            setEditingField(null);
            setPaymentMethod(null);
            setPaidAmount(0);
            setOutputItems([]);
            setShowTicketModal(false);
            resetIdle();
          };

          const updateTicketInfo = (key, value) => {
            setTicketInfo(prev => ({ ...prev, [key]: value }));
            resetIdle();
          };

          const handleTicketChange = (type, delta) => {
            resetIdle();
            const currentQty = ticketInfo.tickets[type];
            const newQty = currentQty + delta;
            const totalTicketsCount = Object.values(ticketInfo.tickets).reduce((a, b) => a + b, 0);
            if (newQty < 0) return;
            if (delta > 0 && totalTicketsCount >= 9) return; 

            const newTickets = { ...ticketInfo.tickets, [type]: newQty };
            
            const basePrice = 375; 
            const halfPrice = Math.ceil(basePrice / 2);
            const total = (newTickets.full * basePrice) + ((newTickets.child + newTickets.senior + newTickets.concession) * halfPrice);

            setTicketInfo(prev => ({ ...prev, tickets: newTickets, totalAmount: total }));
          };

          const insertMoney = (amount) => {
            resetIdle();
            const newPaid = paidAmount + amount;
            setPaidAmount(newPaid);
            if (newPaid >= ticketInfo.totalAmount) {
                setTimeout(() => processSuccess(newPaid), 800);
            }
          };

          // 新增：處理信用卡感應
          const handleCardTap = () => {
            if (step === 'PAYMENT' && paymentMethod === 'card') {
                resetIdle();
                processSuccess(ticketInfo.totalAmount);
            }
          };

          // 處理左側邊欄點擊「更改」
          const handleSidebarEdit = (field) => {
             resetIdle();
             setEditingField(field);
             if (field === 'origin' || field === 'destination') {
                 setSelectedRegion(null);
                 setSelectedCounty(null);
                 setStep('STATION_SELECT');
             } else if (field === 'date') {
                 setStep('DATE_SELECT');
             } else if (field === 'timeRange') {
                 setStep('TIME_SELECT');
             } else if (field === 'purchaseType') {
                 setStep('PURCHASE_TYPE_SELECT');
             }
          };

          const processSuccess = (finalPaidAmount) => {
             setStep('SUCCESS');
             const change = finalPaidAmount - ticketInfo.totalAmount;
             
             setTimeout(() => {
                 let items = [];
                 // 找零硬幣，固定排在左側
                 if (change > 0) {
                     const coinCount = Math.min(Math.ceil(change / 50) + Math.floor((change%50)/10), 8); // 最多示意8枚
                     for(let i=0; i<coinCount; i++) {
                         items.push({ 
                             type: 'coin', 
                             value: i % 2 === 0 ? 50 : 10, 
                             id: `coin-${i}`,
                             style: { left: `${15 + (i * 6)}%` } // 固定左側依序排列
                         });
                     }
                 }
                 // 車票，固定排在右側
                 items.push({ 
                     type: 'ticket', 
                     id: 'ticket-1',
                     style: { right: '15%' } 
                 });
                 setOutputItems(items);
                 
                 setTimeout(() => { setShowTicketModal(true); }, 1000);
             }, 1000);
          };

          // 收走硬幣
          const collectItem = (id, type) => {
             if (type === 'coin') {
                 setOutputItems(prev => prev.filter(item => item.id !== id));
             } else if (type === 'ticket') {
                 setShowTicketModal(true);
             }
          };

          // ===== 拖曳付款事件 (Drag & Drop) =====
          const handleDragStart = (e, value, type) => {
              e.dataTransfer.setData('amount', value);
              e.dataTransfer.setData('type', type); // 'bill' or 'coin'
          };
          
          const handleDrop = (e, targetSlot) => {
              e.preventDefault();
              setDragOverSlot(null);
              const amount = parseInt(e.dataTransfer.getData('amount'));
              const type = e.dataTransfer.getData('type');
              
              if (amount) {
                  // 檢查是否投錯洞 (紙鈔投紙鈔孔，硬幣投硬幣孔)
                  if ((targetSlot === 'bill' && type === 'bill') || (targetSlot === 'coin' && type === 'coin')) {
                      insertMoney(amount);
                  } else {
                      alert('請投入正確的插入口！(紙鈔請插右側，硬幣請投左側)');
                  }
              }
          };

          const renderHeader = () => (
            <div className="flex justify-between items-center bg-gray-100 px-6 py-2 border-b-2 border-gray-300">
              <div className="flex space-x-2">
                {step !== 'HOME' && (
                  <button onClick={handleReset} className="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded-md font-bold shadow flex items-center">
                    回首頁
                  </button>
                )}
              </div>
              <div className="text-right text-gray-800 flex items-center space-x-4">
                <div className="text-sm">現在 {currentTime.getFullYear()}/{String(currentTime.getMonth() + 1).padStart(2, '0')}/{String(currentTime.getDate()).padStart(2, '0')}</div>
                <div className="text-3xl font-bold tracking-wider">{String(currentTime.getHours()).padStart(2, '0')}:{String(currentTime.getMinutes()).padStart(2, '0')}</div>
              </div>
            </div>
          );

          const renderSidebar = () => (
            <div className="w-1/4 bg-gray-200 border-r-2 border-gray-300 flex flex-col p-2 space-y-2">
              {[
                { key: 'purchaseType', label: '購票類型', value: ticketInfo.purchaseType, active: step === 'PURCHASE_TYPE_SELECT' },
                { key: 'date', label: '乘車日期', value: ticketInfo.date, active: step === 'DATE_SELECT' },
                { key: 'timeRange', label: '發車時間', value: ticketInfo.timeRange, active: step === 'TIME_SELECT' },
                { key: 'origin', label: '起站', value: ticketInfo.origin, active: editingField === 'origin' && step === 'STATION_SELECT' },
                { key: 'destination', label: '到達站', value: ticketInfo.destination || '請選擇', active: editingField === 'destination' && step === 'STATION_SELECT' }
              ].map((item, idx) => (
                <div key={idx} className="flex bg-gray-100 rounded-lg shadow overflow-hidden h-16">
                  <div className="flex-1 p-2 flex flex-col justify-center pl-4">
                    <span className="text-xs text-gray-500 font-bold">{item.label}</span>
                    <span className="text-sm text-gray-800 font-bold truncate">{item.value}</span>
                  </div>
                  {/* 所有按鈕都可以點擊更改 */}
                  <button 
                    onClick={() => handleSidebarEdit(item.key)}
                    className={`w-16 flex flex-col justify-center items-center cursor-pointer transition-colors
                    ${item.active ? 'bg-orange-500 text-white' : 'bg-blue-400 text-white hover:bg-blue-500'}`}>
                    <i className="fa-solid fa-pen text-[20px]"></i>
                    <span className="text-xs mt-1">更改</span>
                  </button>
                </div>
              ))}
            </div>
          );

          const renderFooter = (onPrev, onNext, isNextDisabled = false) => (
            <div className="flex justify-between items-center bg-gray-200 px-6 py-3 border-t-2 border-gray-300">
              <div className="flex items-center space-x-4 text-gray-600">
                <div className="bg-blue-800 text-white p-2 rounded flex items-center justify-center"><i className="fa-solid fa-circle-question text-[24px]"></i></div>
                <span className="font-bold">剩餘時間：{idleTime} 秒</span>
              </div>
              <div className="flex space-x-4">
                {onPrev && (<button onClick={onPrev} className="bg-gray-100 hover:bg-gray-300 border-2 border-gray-300 text-gray-800 px-8 py-3 rounded-lg text-xl font-bold shadow-md">上一步</button>)}
                {onNext && (<button onClick={onNext} disabled={isNextDisabled} className={`px-8 py-3 rounded-lg text-xl font-bold shadow-md transition-colors ${isNextDisabled ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-gray-100 hover:bg-gray-300 border-2 border-gray-300 text-gray-800'}`}>確定</button>)}
              </div>
            </div>
          );

          // ===== 左側欄編輯畫面擴充 =====
          const renderDateSelect = () => {
             // 簡單產生未來 7 天
             const days = [];
             for(let i=0; i<8; i++) {
                 const d = new Date(); d.setDate(d.getDate() + i);
                 days.push(`${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`);
             }
             return (
               <div className="flex-1 flex flex-col h-full bg-gray-50"><div className="flex flex-1 overflow-hidden">{renderSidebar()}
                <div className="flex-1 flex flex-col"><div className="bg-blue-600 text-white p-3 font-bold flex justify-between items-center shadow-md"><span className="text-lg">請選擇乘車日期</span></div>
                  <div className="flex-1 p-8 grid grid-cols-2 md:grid-cols-3 gap-4 auto-rows-max">
                     {days.map(d => (
                         <button key={d} onClick={() => { updateTicketInfo('date', d); setStep('TIMETABLE'); }} 
                            className={`h-20 rounded-xl shadow border-2 font-bold text-2xl transition-colors ${ticketInfo.date === d ? 'bg-orange-500 text-white' : 'bg-white text-gray-800 hover:bg-gray-100'}`}>{d}</button>
                     ))}
                  </div>
                </div></div>{renderFooter(() => setStep('TIMETABLE'), null)}</div>
             );
          };

          const renderTimeSelect = () => {
             const times = ['00:00 - 06:00', '06:00 - 12:00', '12:00 - 18:00', '18:00 - 23:59', '全部時間'];
             return (
               <div className="flex-1 flex flex-col h-full bg-gray-50"><div className="flex flex-1 overflow-hidden">{renderSidebar()}
                <div className="flex-1 flex flex-col"><div className="bg-blue-600 text-white p-3 font-bold flex justify-between items-center shadow-md"><span className="text-lg">請選擇發車時間</span></div>
                  <div className="flex-1 p-8 grid grid-cols-1 md:grid-cols-2 gap-6 auto-rows-max">
                     {times.map(t => (
                         <button key={t} onClick={() => { updateTicketInfo('timeRange', t); setStep('TIMETABLE'); }} 
                            className={`h-24 rounded-xl shadow border-2 font-bold text-3xl transition-colors ${ticketInfo.timeRange === t ? 'bg-orange-500 text-white' : 'bg-white text-gray-800 hover:bg-gray-100'}`}>{t}</button>
                     ))}
                  </div>
                </div></div>{renderFooter(() => setStep('TIMETABLE'), null)}</div>
             );
          };

          const renderPurchaseTypeSelect = () => (
             <div className="flex-1 flex flex-col h-full bg-gray-50"><div className="flex flex-1 overflow-hidden">{renderSidebar()}
              <div className="flex-1 flex flex-col"><div className="bg-blue-600 text-white p-3 font-bold flex justify-between items-center shadow-md"><span className="text-lg">請選擇購票類型</span></div>
                <div className="flex-1 p-8 flex items-center justify-center space-x-6">
                   <button onClick={() => { updateTicketInfo('purchaseType', '時刻購票'); setStep('TRAIN_TYPE'); }} className="w-64 h-64 bg-white border-4 border-orange-500 rounded-2xl shadow-xl flex flex-col items-center justify-center font-bold text-3xl text-gray-800 active:scale-95"><i className="fa-solid fa-clock text-6xl text-orange-500 mb-4"></i>時刻購票</button>
                   <button onClick={() => { updateTicketInfo('purchaseType', '車次購票'); setStep('TRAIN_TYPE'); }} className="w-64 h-64 bg-white border-4 border-gray-300 rounded-2xl shadow-xl flex flex-col items-center justify-center font-bold text-3xl text-gray-800 hover:bg-gray-50 active:scale-95"><i className="fa-solid fa-train text-6xl text-gray-500 mb-4"></i>車次購票</button>
                </div>
              </div></div>{renderFooter(() => setStep('HOME'), null)}</div>
          );


          // ===== 主要流程畫面 =====
          const renderHome = () => (
            <div className="flex-1 bg-gray-50 flex flex-col h-full overflow-hidden" onClick={resetIdle}>
              <div className="flex-1 p-6 md:p-10 grid grid-cols-3 gap-4 md:gap-6 auto-rows-fr">
                <button onClick={() => { setEditingField('destination'); updateTicketInfo('purchaseType', '時刻購票'); setStep('TRAIN_TYPE'); }} className="bg-blue-700 hover:bg-blue-600 text-white rounded-xl shadow-lg flex flex-col items-center justify-center p-4 transition-transform transform active:scale-95">
                  <i className="fa-solid fa-ticket text-[50px] md:text-[64px] mb-4"></i>
                  <span className="text-2xl md:text-3xl font-bold tracking-widest">購買車票</span>
                </button>
                <button className="bg-blue-700 hover:bg-blue-600 text-white rounded-xl shadow-lg flex flex-col items-center justify-center p-4 transition-transform transform active:scale-95">
                  <i className="fa-solid fa-bolt text-[50px] md:text-[64px] mb-4"></i>
                  <span className="text-2xl md:text-3xl font-bold tracking-widest">當日快速購票</span>
                </button>

                           </div>
                           <div className="flex justify-center space-x-4">
                               {[50, 10, 5, 1].map(val => (
                                   <button key={val} 
                                        draggable="true"
                                        onDragStart={(e) => handleDragStart(e, val, 'coin')}
                                        onClick={() => insertMoney(val)} 
                                        className="bg-yellow-50 border-2 border-yellow-500 text-yellow-800 font-bold text-xl w-14 h-14 rounded-full shadow-md hover:bg-yellow-100 transition-transform active:scale-90 flex items-center justify-center cursor-grab active:cursor-grabbing">
                                       {val}
                                   </button>
                               ))}
                           </div>
                       </div>
                    </div>
                 );
             } else {
                 return (
                    <div className="flex-1 flex flex-col bg-gray-50 justify-center items-center text-center p-8 relative" onClick={resetIdle}>
                        <h2 className="text-4xl font-bold text-gray-800 mb-6 tracking-widest">請感應信用卡</h2>
                        <i className="fa-solid fa-arrow-down text-blue-500 text-6xl animate-bounce mb-8"></i>
                        <div className="bg-blue-50 text-blue-700 px-6 py-4 rounded-xl font-bold text-2xl border border-blue-200 shadow-sm flex items-center">
                            <i className="fa-solid fa-hand-pointer mr-3 text-3xl"></i> 請點擊下方機台的「卡片感應區」模擬付款
                        </div>
                    </div>
                 );
             }
          };

          const renderSuccess = () => (
            <div className="flex-1 flex flex-col h-full bg-gray-50 items-center justify-center">
              <div className="bg-white p-10 rounded-3xl shadow-xl flex flex-col items-center border-4 border-green-500 text-center mx-4 max-w-lg w-full">
                <i className="fa-solid fa-circle-check text-[80px] text-green-500 mb-6"></i>
                <h1 className="text-3xl font-bold text-gray-800 mb-4 tracking-widest">交易成功</h1>
                <p className="text-xl text-gray-600 font-bold mb-6">請於下方出口點擊領取您的車票與找零</p>
                <button onClick={handleReset} className="mt-4 bg-gray-200 text-gray-700 hover:bg-gray-300 px-6 py-2 rounded-xl font-bold shadow">
                  完成並返回首頁
                </button>
              </div>
            </div>
          );

          // 高擬真直式車票彈窗 (圖二/圖五風格)
          const renderTicketModal = () => {
             if(!showTicketModal) return null;
             
             // 產生假資料字串
             const trainNameEn = ticketInfo.selectedTrain?.type === '自強' ? 'T.C.LTD EXP' : (ticketInfo.selectedTrain?.type === '普悠瑪' ? 'PUYUMA' : 'LOCAL');
             const ticketType = ticketInfo.tickets.full > 0 ? '全票' : '半票';
             const seatCar = '12';
             const seatNum = '11';
             const price = ticketInfo.totalAmount;

             return (
               <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                  {/* 直式車票本體 */}
                  <div className="ticket-bg w-[320px] rounded shadow-2xl border border-gray-300 relative animate-slide-up-fade text-gray-900 font-sans p-4 flex flex-col">
                     <button onClick={() => setShowTicketModal(false)} className="absolute -top-10 right-0 text-white hover:text-gray-300 font-bold text-3xl"><i className="fa-solid fa-times"></i></button>
                     
                     {/* 頂部標頭 */}
                     <div className="text-center font-bold text-[18px] tracking-[0.5em] mb-2 text-black">臺鐵公司</div>
                     
                     {/* 日期與車次 */}
                     <div className="flex justify-between font-bold text-[16px] mb-2">
                         <span>{ticketInfo.date.replace(/\//g, '.')}</span>
                         <span>{ticketInfo.selectedTrain?.no}次</span>
                     </div>
                     
                     {/* 票種與車種 */}
                     <div className="flex justify-between font-bold items-end border-b border-gray-400 pb-2 mb-4">
                         <span className="text-[20px]">{ticketType}</span>
                         <div className="text-right leading-tight">
                             <div className="text-[20px]">{ticketInfo.selectedTrain?.type}</div>
                             <div className="text-[12px] uppercase">{trainNameEn}</div>
                         </div>
                     </div>
                     
                     {/* 起迄站與時間資訊 */}
                     <div className="flex justify-between items-start mb-4">
                         {/* 左側：車站 */}
                         <div className="flex flex-col items-center">
                             <span className="text-[36px] font-bold leading-none mb-1">{ticketInfo.origin}</span>
                             <span className="text-[14px] uppercase font-bold mb-1">Station</span>
                             <i className="fa-solid fa-caret-down my-1 text-[24px]"></i>
                             <span className="text-[36px] font-bold leading-none mt-1 mb-1">{ticketInfo.destination}</span>
                             <span className="text-[14px] uppercase font-bold">Station</span>
                         </div>
                         {/* 右側：時間與座位 */}
                         <div className="flex flex-col items-end text-right">
                              <div className="font-bold text-[22px] leading-none mb-1">{ticketInfo.selectedTrain?.dep}開</div>
                              <div className="text-[12px] uppercase font-bold mb-3">DEPARTURE</div>
                              
                              <div className="font-bold text-[24px] leading-none mb-1">{seatCar}車{seatNum}號</div>
                              <div className="text-[12px] uppercase font-bold mb-3">CAR.{seatCar} SEAT.{seatNum}</div>
                              
                              <div className="font-bold text-[22px] leading-none mb-1">{ticketInfo.selectedTrain?.arr}到</div>
                              <div className="text-[12px] uppercase font-bold mb-2">ARRIVAL</div>
                              
                              <div className="font-bold text-[24px]">NT${price}</div>
                         </div>
                     </div>
                     
                     {/* 底部：假 QR Code 與條碼資訊 */}
                     <div className="flex justify-between items-end border-t border-gray-400 pt-3">
                         <div className="bg-white p-1 rounded-sm"><i className="fa-solid fa-qrcode text-[75px]"></i></div>
                         <div className="text-[10px] text-right font-bold leading-tight">
                              <div>限當日當次車有效</div>
                              <div>-</div>
                              <div>1210-1173-0822 20:05</div>
                              <div>N4030205765-0810</div>
                              <div>網刷&#123;5258&#125;會</div>
                         </div>
                     </div>

                  </div>
               </div>
             )
          }

          // ===== 實體機台硬體面板 (含 Drag & Drop) =====
          const renderHardwarePanel = () => {
             const isCardActive = (step === 'PAYMENT' && paymentMethod === 'card');
             const isCashActive = (step === 'PAYMENT' && paymentMethod === 'cash');

             return (
               <div className="w-full h-full flex flex-col justify-between p-4 font-sans relative">
                  
                  {/* 上排硬體：感應區與插槽 */}
                  <div className="flex justify-between items-start h-1/2 mt-2 px-2 md:px-8">
                     
                     {/* 左側：硬幣投入口 */}
                     <div className="flex flex-col items-center">
                        <div className="flex items-center space-x-1 mb-1 text-[10px] text-gray-400">
                           <span className="border border-gray-500 rounded-full w-4 h-4 flex items-center justify-center">50</span>
                           <span className="border border-gray-500 rounded-full w-4 h-4 flex items-center justify-center">10</span>
                           <span className="border border-gray-500 rounded-full w-4 h-4 flex items-center justify-center">5</span>
                           <span className="border border-gray-500 rounded-full w-4 h-4 flex items-center justify-center">1</span>
                        </div>
                        <div className="text-xs md:text-sm mb-2 text-blue-300 font-bold tracking-wider">硬幣投入口</div>
                        {/* 支援 Drop 的硬幣槽 */}
                        <div 
                           onDragOver={(e) => { e.preventDefault(); setDragOverSlot('coin'); }}
                           onDragLeave={() => setDragOverSlot(null)}
                           onDrop={(e) => handleDrop(e, 'coin')}
                           className={`w-2 h-16 bg-black rounded-full shadow-[inset_0_0_5px_rgba(0,0,0,1)] border transition-all duration-200
                           ${dragOverSlot === 'coin' ? 'drag-over-slot' : 'border-gray-700'} 
                           ${isCashActive && dragOverSlot !== 'coin' ? 'animate-pulse shadow-[0_0_10px_rgba(250,204,21,0.8)] border-yellow-400' : ''}`}>
                        </div>
                     </div>

                     {/* 中央：卡片感應區 */}
                     <div className="flex flex-col items-center cursor-pointer relative" onClick={handleCardTap}>
                        <div className="text-xs md:text-sm mb-2 text-blue-300 font-bold tracking-wider">卡片感應區</div>
                        <div className={`w-24 md:w-32 h-16 md:h-20 bg-black border-2 border-blue-500 rounded-lg flex items-center justify-center relative transition-colors ${isCardActive ? 'bg-blue-900 border-blue-300 shadow-[0_0_20px_rgba(59,130,246,0.9)] animate-pulse' : ''}`}>
                           <i className={`fa-solid fa-wifi rotate-90 text-2xl md:text-3xl ${isCardActive ? 'text-white' : 'text-blue-500'}`}></i>
                           {isCardActive && <div className="absolute -top-8 text-yellow-300 text-sm font-bold animate-bounce whitespace-nowrap bg-black/50 px-2 rounded">點擊此處感應</div>}
                        </div>
                     </div>

                     {/* 右側：紙鈔插槽 */}
                     <div className="flex flex-col items-end space-y-4 w-1/3">
                        <div className="flex flex-col items-end">
                            <div className="text-xs md:text-sm text-blue-300 font-bold tracking-wider flex items-center mb-1"><i className="fa-solid fa-receipt mr-1"></i> 收據出口</div>
                            <div className="w-20 md:w-28 h-2 bg-black rounded shadow-inner border border-gray-600"></div>
                        </div>
                        <div className="flex flex-col items-end">
                            <div className="text-xs md:text-sm text-blue-300 font-bold tracking-wider flex items-center mb-1"><i className="fa-solid fa-money-bill mr-1"></i> 紙鈔插入口</div>
                            {/* 支援 Drop 的紙鈔槽 */}
                            <div 
                               onDragOver={(e) => { e.preventDefault(); setDragOverSlot('bill'); }}
                               onDragLeave={() => setDragOverSlot(null)}
                               onDrop={(e) => handleDrop(e, 'bill')}
                               className={`w-28 md:w-36 h-4 bg-black rounded shadow-inner flex items-center justify-center border transition-all duration-200 
                               ${dragOverSlot === 'bill' ? 'drag-over-slot' : 'border-gray-600'}
                               ${isCashActive && dragOverSlot !== 'bill' ? 'border-green-400 shadow-[0_0_15px_rgba(74,222,128,0.8)]' : ''}`}>
                                <div className={`w-14 h-1 rounded-full ${isCashActive ? 'bg-green-400 animate-pulse' : 'bg-red-600'}`}></div>
                            </div>
                        </div>
                     </div>
                  </div>

                  {/* 下排：車票與找零出口 (固定位置，點選消失) */}
                  <div className="h-1/2 flex flex-col items-center justify-end relative pb-4">
                      <div className="text-sm md:text-base text-blue-300 font-bold tracking-widest mb-2"><i className="fa-solid fa-ticket mr-2"></i>車票 / 找零出口</div>
                      
                      {/* 金屬凹槽設計 */}
                      <div className="w-[85%] md:w-[60%] h-20 md:h-24 bg-gradient-to-b from-gray-700 to-gray-400 rounded-t-2xl border-x-4 border-t-4 border-gray-500 shadow-[inset_0_15px_25px_rgba(0,0,0,0.9)] relative flex justify-center items-end pb-1 overflow-visible">
                          
                          {/* 渲染輸出的車票與硬幣 */}
                          {outputItems.map((item) => (
                              <div key={item.id} 
                                   className="absolute bottom-2 cursor-pointer transition-transform hover:scale-110 z-20 animate-slide-up-fade"
                                   style={item.style}
                                   onClick={() => collectItem(item.id, item.type)}>
                                  
                                  {/* 硬幣 */}
                                  {item.type === 'coin' && (
                                      <div className="w-8 h-8 md:w-10 md:h-10 bg-yellow-400 rounded-full border-2 border-yellow-600 flex items-center justify-center text-sm font-bold text-yellow-800 shadow-[2px_2px_5px_rgba(0,0,0,0.5)]">
                                          {item.value}
                                      </div>
                                  )}
                                  
                                  {/* 直立式車票 */}
                                  {item.type === 'ticket' && (
                                      <div className="w-16 h-24 bg-[#FEF5E7] border border-gray-400 text-black shadow-[2px_2px_10px_rgba(0,0,0,0.5)] flex flex-col items-center py-2 px-1 relative transform rotate-[10deg]">
                                           <div className="text-[8px] font-bold tracking-widest border-b border-gray-300 w-full text-center pb-1 mb-1">臺鐵公司</div>
                                           <div className="text-[12px] font-bold">{ticketInfo.origin}</div>
                                           <i className="fa-solid fa-caret-down text-[10px] my-[2px]"></i>
                                           <div className="text-[12px] font-bold">{ticketInfo.destination}</div>
                                           <div className="text-[8px] mt-auto font-bold">{ticketInfo.selectedTrain?.type}</div>
                                           
                                           <div className="absolute -top-8 right-0 bg-blue-600 text-white text-xs px-2 py-1 rounded shadow animate-pulse whitespace-nowrap before:content-[''] before:absolute before:top-full before:left-1/2 before:-translate-x-1/2 before:border-4 before:border-transparent before:border-t-blue-600">
                                               點擊查看
                                           </div>
                                      </div>
                                  )}
                              </div>
                          ))}
                      </div>
                  </div>
               </div>
             )
          };

          const renderCurrentStep = () => {
            switch (step) {
              case 'HOME': return renderHome();
              case 'TRAIN_TYPE': return renderTrainType();
              case 'STATION_SELECT': return renderStationSelect();
              case 'TICKET_QUANTITY': return renderTicketQuantity();
              case 'TIMETABLE': return renderTimetable();
              case 'CONFIRMATION': return renderConfirmation();
              case 'PAYMENT': return renderPaymentScreen();
              case 'SUCCESS': return renderSuccess();
              case 'DATE_SELECT': return renderDateSelect();
              case 'TIME_SELECT': return renderTimeSelect();
              case 'PURCHASE_TYPE_SELECT': return renderPurchaseTypeSelect();
              default: return renderHome();
            }
          };

          return (
            <div className="w-full h-[100dvh] bg-black md:p-4 select-none overflow-hidden flex flex-col justify-center items-center">
              <div className="w-full h-full md:max-w-5xl md:max-h-[850px] flex flex-col shadow-[0_0_50px_rgba(0,0,0,0.8)] relative">
                 <div className="flex-1 bg-white md:rounded-t-2xl overflow-hidden flex flex-col border-8 border-gray-800 border-b-4 relative z-10">
                    {renderHeader()}
                    {renderCurrentStep()}
                    {renderTicketModal()}
                 </div>
                 <div className="h-64 md:h-72 bg-zinc-800 md:rounded-b-2xl border-8 border-gray-800 border-t-0 flex flex-col relative z-0 shadow-[inset_0_20px_20px_rgba(0,0,0,0.5)]">
                    {renderHardwarePanel()}
                 </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
